name: Deploy Hospital San Vicente a Producción

# 1. ¿Cuándo se activa? Cuando hagas push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Despliegue en Ubuntu VPS
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Conectar, Actualizar y Levantar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 0. Detener el script si ocurre cualquier error
            set -e

            # 1. Ir a la carpeta del proyecto
            cd /home/deploy/ai-booking

            # 2. Bajar los últimos cambios de GitHub
            git pull origin main

            # 3. Detener y eliminar los contenedores de aplicación (api y web).
            #    postgres y redis NO se tocan para preservar los datos.
            docker compose -f docker-compose.prod.yml stop api web
            docker compose -f docker-compose.prod.yml rm -f api web

            # 4. Reconstruir desde cero sin caché para garantizar que el código
            #    nuevo quede dentro de la imagen (evita el problema de capa cacheada).
            docker compose -f docker-compose.prod.yml build --no-cache api web

            # 5. Levantar todos los servicios
            docker compose -f docker-compose.prod.yml up -d

            # 6. Ejecutar migraciones de Prisma de forma segura
            docker compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
