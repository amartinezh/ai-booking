name: Deploy Hospital San Vicente a Producción

# 1. ¿Cuándo se activa? Cuando hagas push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Despliegue en Ubuntu VPS
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Conectar, Actualizar y Levantar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Ir a la carpeta del proyecto
            cd /home/deploy/ai-booking
            
            # 2. Bajar los últimos cambios de GitHub
            git pull origin main
            
            # 3. Reconstruir los contenedores (Docker es inteligente y solo compilará lo que cambió)
            # Nota: No usamos sudo porque 'deploy' ya está en el grupo docker
            docker compose -f docker-compose.prod.yml up -d --build
            
            # 4. Ejecutar migraciones de Prisma de forma segura
            docker compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma