name: Deploy Agendamiento IA a Producción

# 1. ¿Cuándo se activa? Cuando hagas push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Despliegue en Ubuntu VPS
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Conectar, Actualizar y Levantar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 0. Detener el script si ocurre cualquier error
            set -e

            # 1. Ir a la carpeta del proyecto
            cd /home/deploy/ai-booking

            # 2. Bajar los últimos cambios de GitHub
            git pull origin main

            # 3. CONSTRUIR PRIMERO (Minimiza el tiempo de inactividad)
            # Reconstruye las imágenes mientras la versión anterior sigue funcionando
            docker compose -f docker-compose.prod.yml build api web

            # 4. Detener y eliminar SOLO las versiones antiguas de api y web
            # postgres y redis NO se tocan para preservar los datos.
            docker compose -f docker-compose.prod.yml stop api web
            docker compose -f docker-compose.prod.yml rm -f api web

            # 5. MIGRAR BASE DE DATOS (Contenedor efímero)
            # Se aplica el nuevo esquema ANTES de levantar la aplicación
            docker compose -f docker-compose.prod.yml run --rm api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

            # 6. Levantar todo con la nueva versión y la BD actualizada
            docker compose -f docker-compose.prod.yml up -d