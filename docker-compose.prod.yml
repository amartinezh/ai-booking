services:
  postgres:
    image: postgres:15-alpine
    container_name: antigravity_db_prod
    restart: always
    ports:
      - "127.0.0.1:49317:5432"   # ⚠️ ojo: 127.0.0.1 — NO 0.0.
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: antigravity
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: antigravity_redis_prod
    restart: always
    # Eliminamos el 'ports' por seguridad.
    volumes:
      - redis_data:/data

  # --- NUEVOS SERVICIOS DE PRODUCCIÓN ---

  api:
    container_name: antigravity_api_prod
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env.production
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Fija la zona horaria del proceso. Red de seguridad para cualquier
      # `new Date()` o `toLocale*` que se nos olvide pasar `timeZone` explícito.
      # Los helpers en @antigravity/shared YA pasan timeZone:'America/Bogota'
      # de forma explícita; esto solo cubre código futuro/legacy.
      - TZ=America/Bogota
    depends_on:
      - postgres
      - redis

  web:
    container_name: antigravity_web_prod
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    env_file: .env.production
    depends_on:
      - api
    environment:
      - API_URL=${API_URL}
      # URL interna Docker para llamadas server-side (server actions → NestJS API)
      # NEXT_PUBLIC_* en server actions se lee en runtime, no requiere rebuild
      - NEXT_PUBLIC_API_URL=http://api:3000
      # Fija TZ del SSR de Next: cualquier render server-side de fechas que no
      # pase `timeZone` explícito se servirá en hora Colombia.
      - TZ=America/Bogota

  caddy:
    image: caddy:2-alpine
    container_name: antigravity_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
